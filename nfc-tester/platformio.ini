; ============================================================
;  NFC Tag Multi-Tester — PlatformIO configuration
;  Board: Arduino Uno
; ============================================================
[env:uno]
platform  = atmelavr
board     = uno
framework = arduino

; 115200 baud matches Serial.begin() in main.cpp
monitor_speed = 115200

; Adafruit PN532: supports I2C, SPI, and UART on one library.
; Adafruit BusIO: required I2C/SPI abstraction layer for PN532.
lib_deps =
    adafruit/Adafruit PN532@^1.3.3
    adafruit/Adafruit BusIO@^1.14.1
