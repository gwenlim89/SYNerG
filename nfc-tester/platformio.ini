; ============================================================
;  NFC Tag UID Collector — PlatformIO configuration
;  Board: ESP32-C3
; ============================================================
[env:c3]
platform       = espressif32
board          = lolin_c3_mini
framework      = arduino

build_flags    = -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed  = 115200
monitor_rts    = 0
monitor_dtr    = 0

lib_deps =
    adafruit/Adafruit PN532@^1.3.3
    adafruit/Adafruit BusIO@^1.14.1
