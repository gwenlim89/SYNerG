<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitten Nibbles</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="halo-left" class="screen-halo halo-left"></div>
    <div id="halo-right" class="screen-halo halo-right"></div>

    <main class="app-shell">
      <section class="game-frame">
        <div id="sky" class="sky">
          <div class="hud">
            <button id="language-toggle" class="language-toggle" type="button" aria-label="Toggle language" title="Toggle language">EN</button>
            <button id="settings-button" class="settings-button" type="button" aria-label="Staff settings" title="Staff settings">⚙</button>
            <strong id="connection-status" class="connection-chip">Device: Not connected</strong>
            <div class="progress-meter" aria-label="game progress">
              <span id="hud-progress"></span>
              <strong id="hud-percent">0%</strong>
            </div>
          </div>

          <div class="cloud cloud-one" aria-hidden="true"></div>
          <div class="cloud cloud-two" aria-hidden="true"></div>
          <div class="cloud cloud-three" aria-hidden="true"></div>

          <section id="game-screen" class="screen"></section>

          <div class="hills hill-back" aria-hidden="true"></div>
          <div class="hills hill-front" aria-hidden="true"></div>
          <div class="ground" aria-hidden="true"></div>
        </div>
      </section>

      <section id="settings-panel" class="settings-panel" hidden>
        <div class="settings-heading">
          <div>
            <p class="eyebrow">Staff Area</p>
            <h2>Device and debug tools</h2>
          </div>
          <button id="close-settings-button" class="settings-close-button" type="button" aria-label="Close settings" title="Close settings">×</button>
        </div>

        <p class="connection-label">Player 1</p>
        <div class="connection-row">
          <select id="port-select" aria-label="P1 serial port"></select>
          <button id="refresh-button" class="secondary-button" type="button">Refresh</button>
          <button id="connect-button" class="primary-button" type="button">Connect P1</button>
        </div>
        <p class="connection-label">Player 2</p>
        <div class="connection-row">
          <select id="port-select-p2" aria-label="P2 serial port"></select>
          <button id="connect-button-p2" class="primary-button" type="button">Connect P2</button>
          <strong id="connection-status-p2" class="connection-chip">P2: Not connected</strong>
        </div>

        <div class="debug-row">
          <label><input id="debug-toggle" type="checkbox" checked /> Show round timing</label>
        </div>

        <div class="log-heading">
          <h3>Serial Monitor</h3>
          <button id="clear-log-button" class="secondary-button" type="button">Clear</button>
        </div>
        <ol id="log-list"></ol>

        <div class="reg-section">
          <div class="log-heading">
            <h3>Token Registration</h3>
            <button id="reg-scan-button" class="secondary-button" type="button">Start Scanning</button>
          </div>
          <div class="reg-scan-row">
            <span>Last scanned UID:</span>
            <code id="reg-last-uid" class="reg-uid-display">—</code>
          </div>
          <div class="reg-assign-row">
            <select id="reg-color-select">
              <option value="">Color…</option>
              <option value="RED">Red</option>
              <option value="BLUE">Blue</option>
              <option value="YELLOW">Yellow</option>
            </select>
            <select id="reg-shape-select">
              <option value="">Shape…</option>
              <option value="CIRCLE">Circle</option>
              <option value="SQUARE">Square</option>
              <option value="STAR">Star</option>
              <option value="HEXAGON">Hexagon</option>
              <option value="HEART">Heart</option>
              <option value="TRIANGLE">Triangle</option>
            </select>
            <button id="reg-assign-button" class="secondary-button" type="button" disabled>Register</button>
          </div>
          <ol id="reg-list" class="reg-list"></ol>
          <button id="reg-copy-button" class="secondary-button reg-copy-button" type="button">Copy TAGS code</button>
        </div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
